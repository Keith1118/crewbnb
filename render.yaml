# Render Blueprint — deploys Crewbnb (web + Postgres) in one go.
# In Render: New → Blueprint → connect this repo. Then set the secret values
# marked "sync: false" (they're never stored in git).
databases:
  - name: crewbnb-db
    databaseName: crewbnb
    plan: free                 # upgrade to a paid plan before real launch (free DB expires after 90 days)
    postgresMajorVersion: "16"
    region: frankfurt          # EU (closest to Ireland)

services:
  - type: web
    name: crewbnb
    runtime: docker            # uses the existing Dockerfile (builds JS/CSS + assets)
    plan: free                 # upgrade to Starter for no cold-starts
    region: frankfurt
    healthCheckPath: /up
    # Bind Puma straight to Render's $PORT (entrypoint auto-runs db:prepare on boot).
    dockerCommand: ./bin/rails server
    autoDeploy: true           # redeploy on every push to the default branch
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crewbnb-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false            # paste from your local config/master.key
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"          # Puma serves the precompiled assets
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"          # run background jobs inside the web process (no separate worker)
      - key: WEB_CONCURRENCY
        value: "1"
      - key: APP_HOST
        value: crewbnb.io      # used to build links in emails; change when your domain is live
      # --- Payments (from dashboard.stripe.com) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # --- Email (from Resend/Postmark) — set these to turn on live emails ---
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_DOMAIN
        value: crewbnb.io
