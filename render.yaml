# Render Blueprint — deploys Crewbase (web + Postgres) in one go.
# In Render: New → Blueprint → connect this repo. Then set the secret values
# marked "sync: false" (they're never stored in git).
databases:
  # Internal Render names kept as crewbnb-* on purpose: renaming them would make
  # Render provision a NEW empty database and orphan the one holding real listings.
  # These labels are invisible to users (the public site runs on crewbase.ie).
  - name: crewbnb-db
    databaseName: crewbnb
    plan: free                 # upgrade to a paid plan before real launch (free DB expires after 90 days)
    postgresMajorVersion: "16"
    region: frankfurt          # EU (closest to Ireland)

services:
  - type: web
    name: crewbnb                # internal Render service label (see note above); public site is crewbase.ie
    runtime: docker            # uses the existing Dockerfile (builds JS/CSS + assets)
    plan: free                 # upgrade to Starter for no cold-starts
    region: frankfurt
    healthCheckPath: /up
    # Single startup script: migrate the DB, then start Puma on Render's $PORT.
    dockerCommand: ./bin/render-start
    autoDeploy: true           # redeploy on every push to the default branch
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crewbnb-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true    # Render generates a stable secret so boot never needs the master key
      - key: RAILS_MASTER_KEY
        sync: false            # optional now; paste from config/master.key if you want encrypted credentials
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"          # Puma serves the precompiled assets
      - key: WEB_CONCURRENCY
        value: "1"
      - key: APP_HOST
        value: crewbase.ie      # used to build links in emails; change when your domain is live
      # --- Photo storage: Cloudflare R2 (permanent, survives deploys) ---
      - key: ACTIVE_STORAGE_SERVICE
        value: cloudflare
      - key: R2_BUCKET
        value: crewbase
      - key: R2_ENDPOINT
        value: https://102e53f283a173aa7a776728be1da450.r2.cloudflarestorage.com
      - key: R2_ACCESS_KEY_ID
        sync: false            # set in Render dashboard (R2 API token Access Key ID)
      - key: R2_SECRET_ACCESS_KEY
        sync: false            # set in Render dashboard (R2 API token Secret)
      - key: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required   # R2 rejects the AWS SDK's default extra checksum
      - key: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
      # --- Payments (from dashboard.stripe.com) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # --- Email via Resend (smtp.resend.com) ---
      - key: SMTP_ADDRESS
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: resend         # Resend's SMTP username is always the literal "resend"
      - key: SMTP_PASSWORD
        sync: false           # set in Render dashboard = your Resend API key (re_...)
      - key: SMTP_DOMAIN
        value: crewbase.ie
