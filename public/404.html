<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Page Not Found - Crewbase</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300" rel="stylesheet">
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: #f9f9ff;
        color: #111c2d;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300; }
      nav {
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(226,232,240,0.6);
        padding: 16px 32px;
      }
      nav a {
        font-family: 'Manrope', sans-serif;
        font-size: 20px;
        font-weight: 800;
        color: #001949;
        text-decoration: none;
        letter-spacing: -0.5px;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }
      .error-content { text-align: center; max-width: 480px; }
      .error-code {
        font-family: 'Manrope', sans-serif;
        font-size: 120px;
        font-weight: 800;
        color: #001949;
        line-height: 1;
        opacity: 0.1;
        margin-bottom: -20px;
      }
      .error-icon {
        font-size: 64px;
        color: #001949;
        opacity: 0.3;
        margin-bottom: 24px;
      }
      h1 {
        font-family: 'Manrope', sans-serif;
        font-size: 24px;
        font-weight: 800;
        color: #111c2d;
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
      }
      .btn-primary { background: #001949; color: #fff; }
      .btn-primary:hover { background: #002d75; }
      .btn-outline { border: 1px solid #cbd5e1; color: #475569; background: #fff; }
      .btn-outline:hover { background: #f1f5f9; }
    </style>
  </head>
  <body>
    <nav><a href="/">Crewbase</a></nav>
    <main>
      <div class="error-content">
        <div class="error-code">404</div>
        <span class="material-symbols-outlined error-icon">explore_off</span>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved. If you typed the address, check the spelling.</p>
        <div class="actions">
          <a href="/" class="btn btn-primary">Go home</a>
          <a href="/properties" class="btn btn-outline">Find stays</a>
          <a href="/contact" class="btn btn-outline">Contact us</a>
        </div>
      </div>
    </main>
  </body>
</html>
